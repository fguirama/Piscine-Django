{% extends "base.html" %}

{% block title %}d05/Exercise 0{{ n }}: SQL - Data deleting{% endblock %}

{% block content %}

{% if movies %}
    <form method="post">
        {% csrf_token %}
        <select name="movie">
            {% for movie in movies %}
                <option value="{{ movie.0 }}">{{ movie.0 }}</option>
            {% endfor %}
        </select>
        <button type="submit" name="remove">Remove</button>
    </form>
{% else %}
    <p>No data available</p>
{% endif %}

{% if status %}
    <p>{{ status.status }} - {{ status.text }}</p>
{% endif %}

{% endblock %}
