<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}d07 - Title{% endblock %}</title>
    {% load static %}
    <style>
        {% block css %}{% endblock %}
        * { font-family: sans-serif; }
    </style>
</head>
<body>

{% if user.is_authenticated %}
<form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>
{% endif %}

{% block content %}

{% endblock %}

</body>
</html>
