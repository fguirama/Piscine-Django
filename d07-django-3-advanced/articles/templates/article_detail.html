{% extends "base.html" %}

{% block title %}{{ article.title }}{% endblock %}

{% block content %}
<h2>{{ article.title }}</h2>

<p><strong>Author :</strong> {{ article.author.username }}</p>
<p><strong>Date :</strong> {{ article.created }}</p>
<p><strong>Synopsis :</strong> {{ article.synopsis }}</p>

<hr>

<p>{{ article.content }}</p>
{% endblock %}
