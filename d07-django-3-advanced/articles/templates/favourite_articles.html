{% extends "base.html" %}
{% block title %}My favorite articles{% endblock %}
{% block favourites_active %}active{% endblock %}

{% block content %}
<h2>My favorite articles</h2>

<ul>
  {% for fav in favourites %}
  <li>
    <a href="{% url 'article-detail' fav.article.id %}">
      {{ fav.article.title }}
    </a>
  </li>
  {% endfor %}
</ul>
{% endblock %}
