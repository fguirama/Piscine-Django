<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fifty shades of bic</title>
    <style>
        th, td {
            width:80px;
            height:40px;
        }
    </style>
</head>
<body>

<table>
    <tr>
        {% for color_name in color_names %}
            <th>{{ color_name|title }}</th>
        {% endfor %}
    </tr>

    {% for rows in colors %}
        <tr>
            {% for row in rows %}
                <td style="background-color: {{ row }};"></td>
            {% endfor %}
        </tr>
    {% endfor %}
</table>

</body>
</html>
