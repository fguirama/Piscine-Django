{% extends 'base.html' %}
{% block title %}Chatrooms{% endblock %}

{% block content %}
    <h1>Chatrooms</h1>

    <ul style="display: flex; flex-direction: column;">
        {% for c in chatrooms %}
            <li><a href="{% url 'chatroom' c.id %}">{{ c.name }}</a></li>
        {% endfor %}
    </ul>

{% endblock %}
