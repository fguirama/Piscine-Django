{% extends 'base.html' %}
{% load static %}
{% block title %}Chatroom - {{ chatrooms.name }}{% endblock %}
{% block script %}
<script>
    const roomName = "{{ chatroom.id }}";
    const userId = "{{ request.user.id }}";
    const userName = "{{ request.user.username }}";
</script>
<style>
    .chat-box {
        width: 400px;
        height: 500px;
    }

    .chat-messages {
        margin: 0 0 8px 0;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }
</style>
<script src="{% static 'chat/chatroom.js' %}"></script>
{% endblock %}

{% block content %}
    <div class="row mb-4">
        <div class="col-12">
            <h1 class="text-center">Chatroom {{ chatroom.name }}</h1>
        </div>
    </div>

    <div class="row">
        <div class="col-md-7 mb-3">
            <div class="chat-box border rounded d-flex flex-column shadow">
                <div id="messages" class="chat-messages rounded flex-grow-1 overflow-auto p-3">

                </div>

                <div class="chat-input p-3 rounded">
                    <div class="input-group">
                        <input id="message" class="form-control" placeholder="Type a message">
                        <button id="send" class="btn btn-primary">Send</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header">
                    <h2 class="h5 mb-0">Users</h2>
                </div>
                <div class="card-body">
                    <ul id="users" class="list-unstyled">
                    </ul>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
