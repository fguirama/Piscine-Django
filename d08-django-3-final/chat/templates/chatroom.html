{% extends 'base.html' %}
{% load static %}
{% block title %}Chatroom - {{ chatrooms.name }}{% endblock %}
{% block script %}
<script>
    const roomName = "{{ chatroom.id }}";
    const userId = "{{ request.user.id }}";
    const userName = "{{ request.user.username }}";
</script>
<style>
    .chat-box {
        width: 400px;
        height: 500px;
    }

    .chat-messages {
        margin: 0 0 8px 0;
        word-wrap: break-word;
        overflow-wrap: break-word;
    }
</style>
<script src="{% static 'chat/chatroom.js' %}"></script>
{% endblock %}

{% block content %}
    <h1>Chatroom {{ chatroom.name }}</h1>

    <div class="d-flex">

        <div class="chat-box border rounded d-flex flex-column">
            <div id="messages" class="chat-messages flex-grow-1 overflow-auto p-3">

            </div>

            <div class="chat-input border-top p-2">
                <input id="message" class="form-control" placeholder="Type a message">
                <button id="send" class="btn btn-primary">Send</button>
            </div>

        </div>

        <div>
            <h2>Users</h2>
            <ul id="users">
            </ul>
        </div>
    </div>
{% endblock %}
